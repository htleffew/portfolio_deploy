name: Sync Live Index

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**/*.html'
      - 'master_index.json'
      - 'sync_index.js'

jobs:
  sync_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Index Sync Script
        run: node sync_index.js

      - name: Commit Updated Index
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add projects_index.json
          git commit -m "Auto-sync projects_index.json" || echo "No changes to commit"
          git push

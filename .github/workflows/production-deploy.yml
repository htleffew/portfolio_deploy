name: Production Deploy (Sync + Pages)

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Index Sync Script
        run: node sync_index.js

      - name: Commit and Push Index Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add projects_index.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-sync projects_index.json [skip ci]"
            git push
          fi

      - name: Inject cache-busting version strings
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "Cache-bust version: $SHORT_SHA"
          find . -name '*.html' -not -path './.git/*' | while read f; do
            # Add ?v=SHA to LOCAL .css/.js references ONLY (skip http://, https://, //)
            perl -pi -e 's/href="((?!https?:\/\/|\/\/)[^"]+\.css)"/href="$1?v='"$SHORT_SHA"'"/g' "$f"
            perl -pi -e 's/src="((?!https?:\/\/|\/\/)[^"]+\.js)"/src="$1?v='"$SHORT_SHA"'"/g' "$f"
          done
          echo "Cache-busted $(find . -name '*.html' -not -path './.git/*' | wc -l) HTML files"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Template</title>
    <style>
        :root {
            --tweak-colors-bg-base: #0b1017;
            --tweak-colors-card-bg: rgba(255,255,255,0.05);
            --tweak-colors-text-light: #ebf3ff;
            --tweak-typography-card-title-size: 24;
            --tweak-spacing-grid-columns: 3;
            --tweak-spacing-grid-gap: 24;
            --tweak-spacing-card-padding: 20;
            --tweak-hover-effects-card-lift-amount: 4;
        }
        body {
            background-color: var(--tweak-colors-bg-base);
            color: var(--tweak-colors-text-light);
            font-family: system-ui, sans-serif;
            margin: 0; padding: 40px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(var(--tweak-spacing-grid-columns), 1fr);
            gap: calc(var(--tweak-spacing-grid-gap) * 1px);
        }
        .card {
            background-color: var(--tweak-colors-card-bg);
            padding: calc(var(--tweak-spacing-card-padding) * 1px);
            border-radius: 8px;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(calc(var(--tweak-hover-effects-card-lift-amount) * -1px));
        }
        h2 { font-size: calc(var(--tweak-typography-card-title-size) * 1px); margin: 0 0 10px 0; }
    </style>
</head>
<body>
    <h1 class="tweak-text-library-title">Content Library</h1>
    <div class="grid">
        <div class="card"><h2>Article 1</h2><p>Description snippet...</p></div>
        <div class="card"><h2>Article 2</h2><p>Description snippet...</p></div>
        <div class="card"><h2>Article 3</h2><p>Description snippet...</p></div>
    </div>
    <script>
        window.addEventListener('tweaks-updated', (e) => {
            if (e.detail.text && e.detail.text.libraryTitle) {
                document.querySelector('.tweak-text-library-title').textContent = e.detail.text.libraryTitle;
            }
        });
    </script>
</body>
</html>

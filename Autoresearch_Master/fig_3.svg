<svg fill="none" style="width:100%; height:auto; margin-top:-1px;" viewbox="0 0 800 140" xmlns="http://www.w3.org/2000/svg">
<!-- Sub-chart border -->
<line stroke="var(--brushed)" stroke-opacity="0.3" stroke-width="0.5" x1="80" x2="760" y1="0" y2="0"></line>
<!-- Y-axis -->
<line stroke="var(--phthalo)" stroke-opacity="0.3" stroke-width="0.5" x1="80" x2="80" y1="10" y2="120"></line>
<line stroke="var(--phthalo)" stroke-opacity="0.3" stroke-width="0.5" x1="80" x2="760" y1="120" y2="120"></line>
<text fill="var(--phthalo)" font-family="var(--mono)" font-size="8" text-anchor="end" x="70" y="18">h</text>
<text fill="var(--phthalo)" font-family="var(--mono)" font-size="8" text-anchor="end" x="70" y="120">0</text>
<text fill="var(--dioxazine)" font-family="var(--mono)" font-size="9" letter-spacing="1" text-anchor="middle" transform="rotate(-90,20,65)" x="20" y="65">S_t</text>
<!-- Threshold line -->
<line stroke="var(--alizarin)" stroke-dasharray="6 4" stroke-opacity="0.5" stroke-width="1" x1="80" x2="760" y1="20" y2="20"></line>
<text fill="var(--alizarin)" fill-opacity="0.7" font-family="var(--mono)" font-size="7" text-anchor="start" x="765" y="18">h</text>
<!-- S_t line: low, then spikes at iteration 11 -->
<polyline fill="none" points="80,115 120,112 160,110 200,108 240,106 280,104 320,102 360,100 400,96 440,90 480,80 500,10" stroke="var(--dioxazine)" stroke-linejoin="round" stroke-width="2"></polyline>
<!-- Trigger marker -->
<circle cx="500" cy="10" fill="var(--alizarin)" fill-opacity="0.9" r="4"></circle>
<!-- Reset after revert -->
<line stroke="var(--hookers)" stroke-dasharray="4 2" stroke-width="1.5" x1="500" x2="530" y1="10" y2="110"></line>
<polyline fill="none" points="530,110 570,108 610,106 650,104 690,102 730,100 760,98" stroke="var(--dioxazine)" stroke-linejoin="round" stroke-width="2"></polyline>
</svg>
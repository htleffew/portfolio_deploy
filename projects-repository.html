<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research & Engineering Library | Dr. Heather Leffew</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js" defer></script>
<script src="https://unpkg.com/split-type" defer></script>
<link rel="stylesheet" href="design_system/css/global.css">
</head>
<body>
<div id="preloader"><div id="preloader-left"></div><div id="preloader-right"></div><div id="preloader-line"></div></div>
<div class="atmosphere"></div>
<canvas id="glCanvas"></canvas>



<section class="band band--dark front" data-spine="Library" data-section="Library">

  <div class="col-wide">
    <div class="grid">
      <div>
        <div class="meta-row"><span>Directory</span><span class="sep">/</span><span>Library</span></div>
        <h1 style="max-width:32ch">Research & Engineering Library</h1>
        <div class="abstract">A collection of architectural walkthroughs, behavioral simulations, and ML system designs spanning the portfolio.</div>
      </div>
    </div>
  </div>
  <div class="scroll-cue" aria-hidden="true"><span>Scroll</span><div class="scroll-cue-line"></div></div>
</section>

<section class="band band--dark library-band" style="padding-top:40px;">
  <div class="dashboard-layout">
    <aside class="dashboard-sidebar">
      <div class="db-header">TAXONOMY</div>
      <div id="sidebar-accordion">
        <!-- JS injected categories -->
      </div>
    </aside>
    
    <main class="dashboard-main">
      <div class="db-controls">
        <input type="text" id="searchInput" placeholder="Search publications by title, keyword, or concept...">
        <select id="sortDropdown">
           <option value="relevance">Sort by Relevance</option>
           <option value="alpha">Sort Alphabetically</option>
        </select>
      </div>
      <div class="db-chips" id="tagContainer">
         <!-- Hot buttons injected here -->
      </div>
      
      <div class="db-table" id="tableWrap">
         <!-- table rows injected here -->
      </div>
      <div id="noResults" style="display:none; color:var(--tungsten); margin-top:40px; font-family:var(--mono); font-size:12px; text-transform:uppercase; letter-spacing:0.18em;">0 Publications match the current filtration topology.</div>
    </main>
  </div>
</section>



<script>
window.disableGlobalOrchestration = true;
window.addEventListener('load', () => {
  try {
    // â”€â”€ Initialize Lenis Smooth Scroll â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    let lenis;
    if (typeof Lenis !== 'undefined') {
      lenis = new Lenis({ duration: 1.4, easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), smoothWheel: true });
      if (typeof gsap !== 'undefined') {
        gsap.ticker.add((time) => { lenis.raf(time * 1000); });
        gsap.ticker.lagSmoothing(0);
      } else {
        const lenisRaf = (time) => { lenis.raf(time); requestAnimationFrame(lenisRaf); };
        requestAnimationFrame(lenisRaf);
      }
    }

    if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
      gsap.registerPlugin(ScrollTrigger);

      // â”€â”€ Theatrical Opening Sequence â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      const tl = gsap.timeline({
        onComplete: () => { initScrollTriggers(); }
      });

      const preloader = document.getElementById('preloader');
      const preLeft = document.getElementById('preloader-left');
      const preRight = document.getElementById('preloader-right');
      const preLine = document.getElementById('preloader-line');
      if (preloader && preLeft && preRight && preLine) {
        tl.to(preLine, { height: '28vh', duration: 1.1, ease: 'power2.inOut' });
        tl.to(preLine, { opacity: 0, height: '50vh', duration: 0.6, ease: 'power2.in' }, '+=0.15');
        tl.to(preLeft, { xPercent: -100, duration: 1.1, ease: 'power3.inOut' }, '-=0.25');
        tl.to(preRight, { xPercent: 100, duration: 1.1, ease: 'power3.inOut' }, '<');
        tl.set(preloader, { display: 'none' });
      } else if (preloader) {
        tl.to(preloader, { opacity: 0, duration: 1.2, ease: 'power2.inOut', onComplete: () => { preloader.style.display = 'none'; } });
      }

      // Nav slides in during the curtain reveal
      tl.to('#topnav', { y: 0, duration: 1.4, ease: 'power3.out' }, "-=0.8");

      // Deep-space starfield
      tl.to('#deep-space', { opacity: 1, duration: 3.5, ease: 'power2.inOut' }, "-=1.2");

      // Eyebrow meta row
      tl.to('.front .meta-row span', { opacity: 1, x: 0, duration: 1.0, stagger: 0.2, ease: 'power2.out' }, "-=2.2");

      // Kinetic title
      let heroTitle = document.querySelector('.front h1');
      let split;
      if (heroTitle && typeof SplitType !== 'undefined') {
        heroTitle.style.opacity = '1';
        split = new SplitType(heroTitle, { types: 'words, chars' });
        tl.from(split.chars, { opacity: 0, y: 20, rotateX: -90, stagger: 0.035, duration: 1.5, ease: 'back.out(1.5)' }, "-=1.6");
      } else if (heroTitle) {
        tl.to(heroTitle, { opacity: 1, y: 0, duration: 1.3, ease: 'power2.out' }, "-=1.6");
      }

      // Abstract subtitle
      tl.to('.front .abstract', { opacity: 1, y: 0, duration: 1.3, ease: 'power2.out' }, "-=0.9");

      // Scroll cue fades in last
      tl.to('.scroll-cue', { opacity: 1, duration: 1.2, ease: 'power2.out' }, "-=0.3");

      function initScrollTriggers() {
        if (lenis) lenis.on('scroll', ScrollTrigger.update);

        // Fade out scroll cue as user begins scrolling
        gsap.to('.scroll-cue', {
          opacity: 0, y: -10, duration: 0.6, ease: 'power2.in',
          scrollTrigger: { trigger: '.front', start: 'top top', end: '+=120', scrub: true }
        });

        // â”€â”€ Dashboard Library Section â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        const libBand = document.querySelector('.library-band');
        if (libBand) {
          const libTl = gsap.timeline({
            scrollTrigger: { trigger: libBand, start: 'top 60%', toggleActions: 'play none none none' }
          });
          libTl.fromTo(libBand.querySelector('.dashboard-sidebar'),
            { opacity: 0, x: -40, filter: 'blur(4px)' },
            { opacity: 1, x: 0, filter: 'blur(0px)', duration: 1.6, ease: 'expo.out' }
          );
          libTl.fromTo(libBand.querySelectorAll('.db-controls, .db-chips'),
            { opacity: 0, y: 20, filter: 'blur(4px)' },
            { opacity: 1, y: 0, filter: 'blur(0px)', duration: 1.8, stagger: 0.1, ease: 'expo.out' }, '-=1.0'
          );
        }

        // â”€â”€ Subtle parallax depth on section content â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        gsap.utils.toArray('.band').forEach(band => {
          const inner = band.querySelector('.col-wide') || band.querySelector('.dashboard-layout');
          if (inner) {
            gsap.fromTo(inner, { yPercent: 2 }, {
              yPercent: -2, ease: 'none',
              scrollTrigger: { trigger: band, start: 'top bottom', end: 'bottom top', scrub: true }
            });
          }
        });
      }

    } else {
      // No GSAP â€” make everything visible immediately
      const preloader = document.getElementById('preloader');
      if (preloader) preloader.style.display = 'none';
      document.querySelectorAll('.front .meta-row span, .front h1, .front .abstract, #deep-space, .library-band .dashboard-layout, .library-band .dashboard-sidebar, .library-band .dashboard-main, #topnav').forEach(el => {
        el.style.opacity = '1';
        el.style.transform = 'none';
        el.style.filter = 'none';
      });
    }
  } catch(e) { console.warn('Cinematic init error:', e); }
});

// Nav mode toggle on scroll
(function initNavMode() {
  try {
    const nav = document.getElementById('topnav');
    if (!nav) return;
    const bands = document.querySelectorAll('[data-mode], .band--paper, .band--dark');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const isPaper = entry.target.classList.contains('band--paper') || entry.target.dataset.mode === 'paper';
          nav.classList.toggle('is-paper', isPaper);
        }
      });
    }, { rootMargin: "-15% 0px -84% 0px" });
    bands.forEach(b => observer.observe(b));
  } catch(e) {}
})();

// Progress bar
let cachedScrollHeight = document.documentElement.scrollHeight - window.innerHeight;
window.addEventListener('resize', () => { cachedScrollHeight = document.documentElement.scrollHeight - window.innerHeight; });
window.addEventListener('scroll', () => {
  const p = cachedScrollHeight > 0 ? (window.scrollY / cachedScrollHeight) * 100 : 0;
  const progEl = document.getElementById('progress');
  if(progEl) progEl.style.setProperty('--p', p + '%');
}, { passive: true });
</script>

<!-- Load the Institutional Dashboard Engine -->
<script src="library_dashboard.js"></script>

<!-- Global Chrome Injector -->
<script src="design_system/js/global.js" defer></script>
</body>
</html>

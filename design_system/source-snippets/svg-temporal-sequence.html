<!--
  COMPONENT: SVG Temporal Sequence
  SOURCE:    multimodal-autism-ai.html — FIG.05
  CSS REQUIRED: .figure, .frame, .cap, .cap .num (all in global.css)
  BAND CONTEXT: Designed for band--dark (frame background: #0c0c0c)
  
  CUSTOMIZE:
  - Track labels: "Clinician Actions" / "Patient Responses" → your event sources
  - Event circles: cx positions (time positions on timeline), colors
  - Event labels: text above/below circles
  - Bezier path: connects cause event to effect event
  - Latency label: rect + text showing time delta
  - viewBox width for more events
-->

<div class="figure reveal">
  <div class="frame" style="background:#0c0c0c;">
    <svg viewBox="0 0 800 180" style="width:100%; height:auto;">
      <g font-family="JetBrains Mono" font-size="11" fill="#A1A1A6">

        <!-- Horizontal time axis -->
        <line x1="50" y1="140" x2="750" y2="140" stroke="#333" stroke-width="2"/>
        <text x="400" y="165" text-anchor="middle">Time (Seconds)</text>

        <!-- TRACK 1 — CUSTOMIZE: label and cx range -->
        <text x="50" y="45" font-weight="bold" fill="#F5F5F7">Clinician Actions</text>
        <line x1="200" y1="40" x2="750" y2="40"
              stroke="#222" stroke-width="20" stroke-linecap="round"/>

        <!-- TRACK 2 — CUSTOMIZE: label -->
        <text x="50" y="105" font-weight="bold" fill="#F5F5F7">Patient Responses</text>
        <line x1="200" y1="100" x2="750" y2="100"
              stroke="#222" stroke-width="20" stroke-linecap="round"/>

        <!-- INITIATOR EVENT (blue) — CUSTOMIZE: cx, label text and position -->
        <circle cx="300" cy="40" r="6" fill="#0F3A6B"/>
        <text x="300" y="20" text-anchor="middle" fill="#3866A0">Joint Attention Bid</text>

        <!-- RESPONDER EVENT (gold) — CUSTOMIZE: cx, label text and position -->
        <circle cx="450" cy="100" r="6" fill="#DBA844"/>
        <text x="450" y="125" text-anchor="middle" fill="#DBA844">Social Smile</text>

        <!-- LATENCY BEZIER CONNECTOR
             Formula: M [x1] [y1+6] C [x1] [midY], [x2] [midY], [x2] [y2-6]
             midY = (track1_y + track2_y) / 2 = (40 + 100) / 2 = 70
             CUSTOMIZE: control point positions for different event spacing -->
        <path d="M 300 46 C 300 80, 450 60, 450 94"
              fill="none" stroke="#DBA844" stroke-width="2" stroke-dasharray="4 4"/>

        <!-- LATENCY LABEL BOX — CUSTOMIZE: position (center between events), text -->
        <rect x="345" y="60" width="60" height="20" rx="2"
              fill="#161616" stroke="#333"/>
        <text x="375" y="74" text-anchor="middle" font-size="10" fill="#F5F5F7">1.2 sec</text>

      </g>
    </svg>
  </div>
  <!-- CUSTOMIZE: FIG number and caption -->
  <div class="cap">
    <span class="num">FIG. 05</span>
    Temporal sequencing graph. Simple aggregate counts fail to capture the critical clinical
    latency between a clinician's bid and a child's response.
  </div>
</div>

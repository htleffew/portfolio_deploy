<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | Dr. Heather Leffew</title>
    <!-- Design System: tokens load via @import inside institutional.css -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js" defer></script>
    <link rel="stylesheet" href="../portfolio_deploy/design_system/css/global.css">
    <style>
      /* Ensure Markdown components look correct in the reading column */
      .markdown-body { margin-top: 1.5rem; }
      .markdown-body p { margin-bottom: 1.25em; }
      .markdown-body img { max-width: 100%; height: auto; display: block; margin: 2em auto; }
      .markdown-body pre { padding: 1.5em; overflow-x: auto; background: var(--obsidian); border: 1px solid var(--charcoal); margin: 2em 0; }
      .markdown-body code { font-family: var(--mono); font-size: 0.85em; }
    </style>
</head>

<body data-category="{{CATEGORY}}" data-title="{{SHORT_TITLE}}">

<!-- Reading progress -->
<div id="progress"></div>

<!-- Top nav (injected by global_chrome.js) -->
<div id="global-nav-container"></div>

<!-- Chapter spine (populated by global_chrome.js) -->
<aside id="spine"></aside>

<!-- Atmospheric gradient -->
<div class="atmosphere"></div>

<canvas id="glCanvas"></canvas>

<!-- FRONT MATTER -->
<section class="band band--dark front" data-spine="Front" data-section="Front matter">
  <div class="col-wide">
    <div class="grid">
     <div>
      <div class="meta-row">
        <span class="bracket">{{FORMAT}}</span>
        <span class="sep">/</span>
        <span>{{CATEGORY}}</span>
        <span class="sep">/</span>
        <span>{{SUBCATEGORY}}</span>
      </div>

      <h1>{{HEADLINE}}</h1>

      <p class="abstract">
        {{ABSTRACT}}
      </p>

      <div class="byline">
        <div>
          Subject
          <strong>{{SUBJECT}}</strong>
        </div>
        <div>
          Architecture
          <strong>{{ARCHITECTURE}}</strong>
        </div>
        <div>
          Output
          <strong>{{OUTPUT}}</strong>
        </div>
      </div>
     </div>
     <div></div>
    </div>
  </div>
</section>

<!-- INJECTED MARKDOWN CONTENT -->
{{CONTENT}}

<!-- BACK MATTER: Related Works -->
<section class="band band--dark back-matter" data-spine="Research Graph" data-section="Research Graph">
  <div class="back-matter" style="padding-top:0;">
    <h3 style="margin-bottom:22px;">Related Works</h3>
    <div class="related">
      <div class="related-grid" id="recommendation-grid">
        <!-- Populated by global_chrome.js from projects_index.json -->
      </div>
    </div>
  </div>

  <a class="next-chap" id="next-chap-link" href="#">
    <div class="lf">
      <div class="eb">Next Publication</div>
      <div class="ti" id="next-chap-title">Loading...</div>
    </div>
    <div class="rt">&rarr;</div>
  </a>
</section>

<!-- INJECTED SCRIPTS -->
{{SCRIPTS}}

<!-- GLOBAL CHROME -->
<!-- Need relative pathing adjustment based on actual file depth, defaulting to root pathing for now -->
<script src="../portfolio_deploy/design_system/js/global.js" defer></script>
</body>
</html>

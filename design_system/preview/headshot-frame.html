<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_shell.css"></head><body>
<div class="card-eyebrow">Headshot frame — grayscale at rest, color on hover</div>
<div style="display:flex; gap:18px; align-items:flex-start;">
  <div style="position:relative; width:140px; aspect-ratio:3/4; border-radius:12px; overflow:hidden; border:1px solid rgba(51,51,51,0.5);">
    <img src="../assets/Heather_headshot_2.jpg" style="width:100%;height:100%;object-fit:cover;filter:grayscale(100%) contrast(1.1);">
    <div style="position:absolute;inset:0;background:linear-gradient(to top, rgba(3,3,3,0.8) 0%, transparent 50%);"></div>
  </div>
  <div style="position:relative; width:140px; aspect-ratio:3/4; border-radius:12px; overflow:hidden; border:1px solid rgba(77,140,255,0.25); box-shadow:0 0 20px 0 rgba(77,140,255,0.18);">
    <img src="../assets/Heather_headshot_2.jpg" style="width:100%;height:100%;object-fit:cover;filter:grayscale(0%) contrast(1.05);">
    <div style="position:absolute;inset:0;background:linear-gradient(to top, rgba(3,3,3,0.8) 0%, transparent 50%);"></div>
  </div>
  <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#A1A1A6;letter-spacing:0.10em;text-transform:uppercase; padding-top:8px;">REST &nbsp; · &nbsp; HOVER<br><br><span style="color:#4D8CFF;">12px radius<br>3:4 ratio<br>0.6s ease</span></div>
</div>
</body></html>

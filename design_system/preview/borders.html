<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_shell.css"></head><body>
<div class="card-eyebrow">Borders — hairlines never carry brand color at rest</div>
<div style="display:grid; grid-template-columns:repeat(2,1fr); gap:14px 22px;">
  <div><div style="height:32px; border-top:1px solid rgba(255,255,255,0.05);"></div><div class="chip-meta" style="margin-top:6px;">SUBTLE · rgba(255,255,255,.05)</div></div>
  <div><div style="height:32px; border-top:1px solid rgba(51,51,51,0.5);"></div><div class="chip-meta" style="margin-top:6px;">CARD · rgba(51,51,51,.5)</div></div>
  <div><div style="height:32px; border-top:1px solid rgba(255,255,255,0.20);"></div><div class="chip-meta" style="margin-top:6px;">INTERACTIVE · 255/.20</div></div>
  <div><div style="height:32px; border-top:1px dashed rgba(255,255,255,0.20);"></div><div class="chip-meta" style="margin-top:6px;">DASHED · pills + dividers</div></div>
</div>
</body></html>

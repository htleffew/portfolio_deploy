<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_shell.css"></head><body>
<div class="card-eyebrow">Semantic roles</div>
<div style="display:grid; grid-template-columns:repeat(2,1fr); gap:10px 22px; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase;">
  <div style="display:flex; align-items:center; gap:10px;"><span style="width:18px;height:18px;background:#030303;border:1px solid rgba(255,255,255,0.1);border-radius:3px;"></span><span style="color:#A1A1A6;">--bg</span><span style="color:#fff;">obsidian</span></div>
  <div style="display:flex; align-items:center; gap:10px;"><span style="width:18px;height:18px;background:#1A1A1A;border-radius:3px;"></span><span style="color:#A1A1A6;">--bg-raised</span><span style="color:#fff;">charcoal</span></div>
  <div style="display:flex; align-items:center; gap:10px;"><span style="width:18px;height:18px;background:#FFFFFF;border-radius:3px;"></span><span style="color:#A1A1A6;">--fg-1</span><span style="color:#fff;">flare</span></div>
  <div style="display:flex; align-items:center; gap:10px;"><span style="width:18px;height:18px;background:#F5F5F7;border-radius:3px;"></span><span style="color:#A1A1A6;">--fg-2</span><span style="color:#fff;">platinum</span></div>
  <div style="display:flex; align-items:center; gap:10px;"><span style="width:18px;height:18px;background:#A1A1A6;border-radius:3px;"></span><span style="color:#A1A1A6;">--fg-3</span><span style="color:#fff;">tungsten</span></div>
  <div style="display:flex; align-items:center; gap:10px;"><span style="width:18px;height:18px;background:#0F52BA;border-radius:3px;"></span><span style="color:#A1A1A6;">--link</span><span style="color:#fff;">sapphire-d</span></div>
  <div style="display:flex; align-items:center; gap:10px;"><span style="width:18px;height:18px;background:#4D8CFF;border-radius:3px;"></span><span style="color:#A1A1A6;">--accent</span><span style="color:#fff;">sapphire</span></div>
  <div style="display:flex; align-items:center; gap:10px;"><span style="width:18px;height:18px;background:transparent;border:1px solid rgba(51,51,51,0.6);border-radius:3px;"></span><span style="color:#A1A1A6;">--rule</span><span style="color:#fff;">brushed/50</span></div>
</div>
</body></html>

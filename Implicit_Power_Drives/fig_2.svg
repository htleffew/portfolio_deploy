<svg style="display:block; max-height:300px;" viewbox="0 0 720 280" width="100%" xmlns="http://www.w3.org/2000/svg">
<!-- y-axis grid lines -->
<g stroke="var(--paper-3)" stroke-width="1">
<line x1="120" x2="700" y1="40" y2="40"></line>
<line x1="120" x2="700" y1="100" y2="100"></line>
<line x1="120" x2="700" y1="160" y2="160"></line>
<line x1="120" x2="700" y1="220" y2="220"></line>
</g>
<!-- y-axis tick labels -->
<g fill="var(--ink-3)" font-family="var(--mono)" font-size="10" text-anchor="end">
<text x="110" y="44">4.0</text>
<text x="110" y="104">3.0</text>
<text x="110" y="164">2.0</text>
<text x="110" y="224">1.0</text>
<text x="110" y="244">0.0</text>
</g>
<!-- baseline grid label (mean of all baselines visual reference) -->
<line stroke="var(--ink-3)" stroke-width="1.5" x1="120" x2="700" y1="220" y2="220"></line>
<!-- Bars: each 60px wide, x=spacing -->
<!-- Expressive 2.02 -> y = 240 - 2.02*60 = 240 - 121.2 = 118.8 ; height 121.2 -->
<g>
<rect fill="var(--phthalo-lift)" height="121" width="80" x="170" y="119"></rect>
<text fill="var(--ink)" font-family="var(--mono)" font-size="13" text-anchor="middle" x="210" y="115">2.02</text>
<text fill="var(--ink-3)" font-family="var(--mono)" font-size="10.5" letter-spacing="0.1em" text-anchor="middle" x="210" y="262">EXPRESSIVE</text>
</g>
<!-- Blogs 2.07 -->
<g>
<rect fill="var(--phthalo-lift)" height="124" width="80" x="290" y="116"></rect>
<text fill="var(--ink)" font-family="var(--mono)" font-size="13" text-anchor="middle" x="330" y="112">2.07</text>
<text fill="var(--ink-3)" font-family="var(--mono)" font-size="10.5" letter-spacing="0.1em" text-anchor="middle" x="330" y="262">BLOGS</text>
</g>
<!-- Composite 2.35 -->
<g>
<rect fill="var(--phthalo)" height="141" width="80" x="410" y="99"></rect>
<text fill="var(--ink)" font-family="var(--mono)" font-size="13" text-anchor="middle" x="450" y="95">2.35</text>
<text fill="var(--ink-3)" font-family="var(--mono)" font-size="10.5" letter-spacing="0.1em" text-anchor="middle" x="450" y="262">COMPOSITE</text>
</g>
<!-- Manifestos 3.00 -->
<g>
<rect fill="var(--alizarin)" height="180" width="80" x="530" y="60"></rect>
<text fill="var(--alizarin)" font-family="var(--mono)" font-size="13" font-weight="700" text-anchor="middle" x="570" y="55">3.00</text>
<text fill="var(--alizarin)" font-family="var(--mono)" font-size="10.5" font-weight="700" letter-spacing="0.1em" text-anchor="middle" x="570" y="262">MANIFESTOS</text>
</g>
<!-- axis label -->
<text fill="var(--ink-3)" font-family="var(--mono)" font-size="10" text-anchor="middle" transform="rotate(-90, 60, 140)" x="60" y="140">Power score (% of words)</text>
</svg>
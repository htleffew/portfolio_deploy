<rect fill="#DBA844" fill-opacity="0.4" height="22" stroke="#DBA844" stroke-width="1" width="50" x="770" y="170"></rect>
<text fill="#A1A1A6" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="end" x="763" y="185">Last 25</text>

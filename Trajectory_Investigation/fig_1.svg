<rect fill="#3866A0" fill-opacity="0.30" height="22" stroke="#3866A0" stroke-width="1" width="247" x="327" y="90"></rect>
<text fill="#F5F5F7" font-family="'JetBrains Mono', monospace" font-size="11" text-anchor="middle" x="450" y="105">Mid Tertile</text>

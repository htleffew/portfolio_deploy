<rect fill="#7A1626" fill-opacity="0.28" height="22" stroke="#7A1626" stroke-width="1" width="246" x="574" y="90"></rect>
<text fill="#F5F5F7" font-family="'JetBrains Mono', monospace" font-size="11" text-anchor="middle" x="697" y="105">Late Tertile</text>
<!-- First 25 -->
<rect fill="#DBA844" fill-opacity="0.4" height="22" stroke="#DBA844" stroke-width="1" width="50" x="80" y="170"></rect>
<text fill="#A1A1A6" font-family="'JetBrains Mono', monospace" font-size="10" x="148" y="185">First 25</text>

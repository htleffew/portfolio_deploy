<line opacity="0.6" stroke="#DBA844" stroke-dasharray="2 3" stroke-width="0.5" x1="105" x2="105" y1="200" y2="240"></line>
<line opacity="0.6" stroke="#DBA844" stroke-dasharray="2 3" stroke-width="0.5" x1="795" x2="795" y1="200" y2="240"></line>
<text fill="#A1A1A6" font-family="'Lora', serif" font-size="11" font-style="italic" text-anchor="middle" x="105" y="258">arrival behavior</text>
<text fill="#A1A1A6" font-family="'Lora', serif" font-size="11" font-style="italic" text-anchor="middle" x="795" y="258">behavior pre-flag</text>
<!-- Center divider lines for tertiles -->
<line opacity="0.3" stroke="#A1A1A6" stroke-dasharray="2 3" stroke-width="0.5" x1="327" x2="327" y1="115" y2="320"></line>
<line opacity="0.3" stroke="#A1A1A6" stroke-dasharray="2 3" stroke-width="0.5" x1="574" x2="574" y1="115" y2="320"></line>

<svg style="width:100%; height:auto;" viewbox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
<g fill="#A1A1A6" font-family="JetBrains Mono" font-size="10">
<!-- Axes -->
<line stroke="#333" stroke-width="2" x1="50" x2="550" y1="250" y2="250"></line>
<line stroke="#333" stroke-width="2" x1="50" x2="50" y1="250" y2="20"></line>
<text text-anchor="middle" x="300" y="280">False Positive Rate</text>
<text text-anchor="middle" transform="rotate(-90 20,135)" x="20" y="135">True Positive Rate</text>
<!-- Random Baseline -->
<line stroke="#444" stroke-dasharray="4 4" stroke-width="1" x1="50" x2="550" y1="250" y2="20"></line>
<!-- Warning Zone -->
<rect fill="#7A1626" height="35" opacity="0.1" width="500" x="50" y="20"></rect>
<line stroke="#7A1626" stroke-dasharray="2 4" stroke-width="1" x1="50" x2="550" y1="55" y2="55"></line>
<text fill="#7A1626" font-weight="bold" text-anchor="middle" x="300" y="42">OVERFITTING RISK ZONE (AUC &gt; 0.95)</text>
<!-- ROC Curve -->
<path d="M 50 250 Q 80 40 550 20" fill="none" stroke="#3866A0" stroke-width="3"></path>
<circle cx="160" cy="50" fill="#F5F5F7" r="4"></circle>
<text fill="#F5F5F7" x="175" y="55">AUC: 0.974</text>
</g>
</svg>
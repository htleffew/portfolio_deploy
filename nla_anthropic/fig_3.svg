<svg style="width:100%; height:auto; max-height: 120px;" viewbox="0 0 600 120" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arr" markerheight="6" markerwidth="8" orient="auto" refx="6" refy="3">
<polygon fill="var(--tungsten)" points="0 0, 8 3, 0 6"></polygon>
</marker>
</defs>
<!-- Activation vector -->
<rect fill="none" height="50" rx="4" stroke="var(--phthalo-lift)" stroke-width="1.5" width="100" x="10" y="35"></rect>
<text fill="var(--flare)" font-family="monospace" font-size="9" text-anchor="middle" x="60" y="57">Activation</text>
<text fill="var(--tungsten)" font-family="monospace" font-size="8" text-anchor="middle" x="60" y="70">4096-dim vector</text>
<!-- Arrow 1 -->
<line marker-end="url(#arr)" stroke="var(--tungsten)" stroke-width="1.5" x1="110" x2="148" y1="60" y2="60"></line>
<text fill="var(--tungsten)" font-family="monospace" font-size="8" text-anchor="middle" x="129" y="53">inject</text>
<!-- AV block -->
<rect fill="var(--phthalo)" height="70" rx="4" stroke="var(--phthalo-lift)" stroke-width="1.5" width="120" x="150" y="25"></rect>
<text fill="var(--flare)" font-family="monospace" font-size="10" text-anchor="middle" x="210" y="55">Verbalizer</text>
<text fill="var(--tungsten)" font-family="monospace" font-size="8" text-anchor="middle" x="210" y="70">(AV model)</text>
<!-- Arrow 2 -->
<line marker-end="url(#arr)" stroke="var(--tungsten)" stroke-width="1.5" x1="270" x2="308" y1="60" y2="60"></line>
<text fill="var(--hookers)" font-family="monospace" font-size="8" text-anchor="middle" x="289" y="53">NL text</text>
<!-- Text bottleneck -->
<rect fill="none" height="50" rx="4" stroke="var(--hookers)" stroke-dasharray="3 3" stroke-width="1.5" width="100" x="310" y="35"></rect>
<text fill="var(--hookers)" font-family="monospace" font-size="8" text-anchor="middle" x="360" y="57">"The model</text>
<text fill="var(--hookers)" font-family="monospace" font-size="8" text-anchor="middle" x="360" y="69">suspects eval."</text>
<!-- Arrow 3 -->
<line marker-end="url(#arr)" stroke="var(--tungsten)" stroke-width="1.5" x1="410" x2="448" y1="60" y2="60"></line>
<!-- AR block -->
<rect fill="var(--ink)" height="70" rx="4" stroke="var(--graphite)" stroke-width="1.5" width="120" x="450" y="25"></rect>
<text fill="var(--flare)" font-family="monospace" font-size="10" text-anchor="middle" x="510" y="55">Reconstructor</text>
<text fill="var(--tungsten)" font-family="monospace" font-size="8" text-anchor="middle" x="510" y="70">(AR model)</text>
</svg>